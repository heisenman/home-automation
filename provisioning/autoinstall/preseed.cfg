# Debian 13 "trixie" preseed — unattended minimal install for the GMKtec G11.
# Leaves the box SSH-reachable (key-only) with the first-boot provisioner enabled.
#
# BEFORE BUILDING THE ISO, fill the <PLACEHOLDER> values below:
#   * hostname
#   * the user's sha-512 password hash       (mkpasswd -m sha-512)
#   * the workstation SSH public key          (in the late_command block)
#
# Bootstrap uses DHCP; the static IP is set in Stage 2 (spec §2). OS installs to the
# FIRST disk only; the second NVMe is left untouched for data (spec §3).

### Localization
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network (DHCP for bootstrap)
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string <PLACEHOLDER-HOSTNAME>
d-i netcfg/get_domain string lan
d-i netcfg/hostname string <PLACEHOLDER-HOSTNAME>

### Mirror (online bootstrap). For air-gap rebuilds, point at a local snapshot mirror.
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string trixie

### Accounts — no root password (sudo via user), create 'visko'
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Home Automation
d-i passwd/username string visko
d-i passwd/user-password-crypted password <PLACEHOLDER-SHA512-HASH>
d-i user-setup/allow-password-weak boolean false
d-i user-setup/encrypt-home boolean false

### Clock
d-i clock-setup/utc boolean true
d-i time/zone string Etc/UTC
d-i clock-setup/ntp boolean true

### Partitioning — install to the smallest disk (OS), leave the other NVMe for data.
d-i partman/early_command string \
  DISK=$(list-devices disk | xargs -I{} sh -c 'echo $(blockdev --getsize64 {}) {}' | sort -n | head -1 | cut -d" " -f2); \
  debconf-set partman-auto/disk "$DISK"; \
  debconf-set grub-installer/bootdev "$DISK"
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Base system — minimal, no desktop task
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string openssh-server git curl ca-certificates build-essential python3-venv python3-dev pkg-config sudo
d-i pkgsel/upgrade select safe-upgrade
popularity-contest popularity-contest/participate boolean false

### Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true

### Finish
d-i finish-install/reboot_in_progress note

### Post-install: SSH key, sudo, and the first-boot provisioner.
# (firstboot.sh is copied onto the ISO at /ha/firstboot.sh by build-seed-iso.sh)
d-i preseed/late_command string \
  in-target mkdir -p /home/visko/.ssh /opt/ha-bootstrap; \
  echo '<PLACEHOLDER-SSH-PUBLIC-KEY>' > /target/home/visko/.ssh/authorized_keys; \
  in-target chown -R visko:visko /home/visko/.ssh; \
  in-target chmod 700 /home/visko/.ssh; \
  in-target chmod 600 /home/visko/.ssh/authorized_keys; \
  echo 'visko ALL=(ALL) NOPASSWD: ALL' > /target/etc/sudoers.d/90-visko-bootstrap; \
  in-target chmod 440 /etc/sudoers.d/90-visko-bootstrap; \
  cp /cdrom/ha/firstboot.sh /target/opt/ha-bootstrap/firstboot.sh; \
  in-target chmod +x /opt/ha-bootstrap/firstboot.sh; \
  printf '[Unit]\nDescription=HA first-boot provisioner\nAfter=network-online.target\nWants=network-online.target\nConditionPathExists=/opt/ha-bootstrap/firstboot.sh\n[Service]\nType=oneshot\nExecStart=/opt/ha-bootstrap/firstboot.sh\nRemainAfterExit=yes\nStandardOutput=append:/var/log/ha-firstboot.log\nStandardError=append:/var/log/ha-firstboot.log\n[Install]\nWantedBy=multi-user.target\n' > /target/etc/systemd/system/ha-firstboot.service; \
  in-target systemctl enable ha-firstboot.service

# NOTE: the bootstrap NOPASSWD-ALL sudoers (90-visko-bootstrap) is intentionally broad to let
# the on-device LLM run Stage 2 unattended. Stage 2 §7 REPLACES it with the narrow ha-services
# rule (systemctl ha-* / mosquitto only). Do not leave the broad rule in place post-provisioning.
