# Mosquitto broker config — home automation Phase 1
# Local-only, no TLS yet (Phase 5/6 when actuators arrive and per ADR-0001)
# Only listens on loopback; edge nodes connect via LAN when they arrive.

listener 1883 127.0.0.1
allow_anonymous true

# Persistent sessions and message queue
persistence true
persistence_location /home/visko/home_automation/instance/mosquitto/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type subscribe
log_timestamp true

# Retained messages kept across restarts
retained_persistence true

# Max payload 64 KB (sensor readings are tiny; cap guards against accidents)
message_size_limit 65536
