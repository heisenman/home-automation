# Cluster-bus broker bridge — mirrors ONLY the `ha/cluster/#` namespace between the two dictator nodes,
# so each box's local broker carries BOTH nodes' heartbeats (cross-node sensing redundant with SSH/VRRP).
# Device telemetry (`home/#`) is deliberately NOT bridged — no loop risk, no cross-node device coupling (ADR-0011).
#
# INSTALL (standby .245 only — it connects OUTBOUND to the primary's broker):
#   sudo cp failover/mosquitto/cluster-bridge.conf /etc/mosquitto/conf.d/cluster-bridge.conf
#   sudo systemctl restart mosquitto
# The primary (210) broker is anonymous on the LAN, so NO remote credentials are needed here. Putting the
# single bridge on .245 is sufficient: `both` mirrors each side's heartbeats to the other (one connection).
# If 210's broker is ever locked down, add: remote_username / remote_password below.

connection cluster-245-to-210
address 192.168.0.210:1883
topic ha/cluster/# both 0
bridge_protocol_version mqttv311
cleansession false
notifications false
try_private true
restart_timeout 5
start_type automatic
