# Mosquitto drop-in config — home automation Phase 1
# Loaded alongside /etc/mosquitto/mosquitto.conf (which sets persistence defaults).
# Only override what differs from the system defaults.
#
# Central broker for the system (ADR-0001): edge scanner nodes — the ESP32s, and the
# desktop acting as a temporary BLE scanner — publish here. So it must accept LAN
# connections, not just localhost. Anonymous access is acceptable on a trusted home
# LAN (same posture as the read-only API); TLS + auth come in Phase 5/6 when actuators
# arrive and the broker carries authority, not just sensor telemetry.
listener 1883 0.0.0.0
allow_anonymous true

# Logging — stdout in addition to the default file log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type subscribe
log_timestamp true

# Max payload 64 KB (sensor readings are tiny; cap guards against accidents)
message_size_limit 65536
