# Mosquitto AUTH drop-in — STAGED, not yet deployed. Replaces the anonymous homeauto.conf only after
# the coordinated cutover (provisioning/broker-auth-cutover.md): every client must hold credentials
# FIRST, or it is locked out. Until then the live broker keeps allow_anonymous=true.

listener 1883 0.0.0.0
allow_anonymous false
password_file /etc/mosquitto/passwd
acl_file /etc/mosquitto/acl

log_dest stdout
log_type error
log_type warning
log_type notice
message_size_limit 65536
