# Levoit Vital 200S (LAP-V201S, ESP32-C3-SOLO-1) — FULL purifier control.
# = tuct/levoit's tested Vital 200S config (UART GPIO18/19 to the MCU, model VITAL200S, full entity set)
#   merged with our beachhead networking (name levoit-office, our WiFi/OTA secrets, MQTT -> .210 for our bus).
# Pushed via OTA over the beachhead. WiFi/OTA/fallback-AP unchanged, so recovery paths are intact.
substitutions:
  device_name: levoit-office
  wifi_ap_ssid: "levoit-office-fallback"
  rx_pin: GPIO18                 # C3-SOLO-1 -> Vital 200S MCU UART (tuct, tested) — NOT the flash pads
  tx_pin: GPIO19

esphome:
  name: ${device_name}
  friendly_name: Levoit Office

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

external_components:
  - source:
      type: git
      url: https://github.com/tuct/levoit
      ref: main
    components: [levoit]

logger:
  level: DEBUG                    # MCU-comms debug rides to MQTT levoit-office/debug while we verify

api:

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "${wifi_ap_ssid}"
    password: !secret fallback_ap_password

captive_portal:

mqtt:
  broker: 192.168.0.210          # dictator real IP (VIP .200 unreachable from CTWap_24g wifi)
  port: 1883

uart:
  - id: uart_mcu2esp
    tx_pin:
      number: ${tx_pin}
      inverted: false
    rx_pin:
      number: ${rx_pin}
      inverted: false
    baud_rate: 115200

levoit:
  id: levoitvital200
  model: VITAL200S

fan:
  - platform: levoit
    levoit: levoitvital200
    name: "Fan"
    id: levoit_fan1

switch:
  - platform: levoit
    levoit: levoitvital200
    name: "Display"
    type: display
  - platform: levoit
    levoit: levoitvital200
    name: "Child Lock"
    type: child_lock
  - platform: levoit
    levoit: levoitvital200
    name: "Light Detect"
    type: light_detect
  - platform: levoit
    levoit: levoitvital200
    name: "Quick Clean Preset"
    type: quick_clean
  - platform: levoit
    levoit: levoitvital200
    name: "Daytime Preset"
    type: daytime_enabled

number:
  - platform: levoit
    levoit: levoitvital200
    name: "Timer (min)"
    type: timer
  - platform: levoit
    levoit: levoitvital200
    name: "Auto Mode Room Size"
    type: efficiency_room_size
  - platform: levoit
    levoit: levoitvital200
    name: "Filter Months"
    type: filter_lifetime_months
  - platform: levoit
    levoit: levoitvital200
    name: "Sleep Mode Minutes"
    type: sleep_minutes
  - platform: levoit
    levoit: levoitvital200
    name: "Sleep Fan Level (5=auto)"
    type: sleep_fan_level
  - platform: levoit
    levoit: levoitvital200
    name: "Quick Clean Minutes"
    type: quick_clean_minutes
  - platform: levoit
    levoit: levoitvital200
    name: "Quick Clean Fan Level"
    type: quick_clean_fan_level
  - platform: levoit
    levoit: levoitvital200
    name: "Daytime Fan Level"
    type: daytime_fan_level

sensor:
  - platform: levoit
    levoit: levoitvital200
    name: "PM 2.5"
    type: pm25
  - platform: levoit
    levoit: levoitvital200
    name: "AQI"
    type: aqi
  - platform: levoit
    levoit: levoitvital200
    name: "Current CADR"
    type: current_cadr
  - platform: levoit
    levoit: levoitvital200
    name: "Filter %"
    type: filter_life_left

select:
  - platform: levoit
    levoit: levoitvital200
    name: "Auto Mode"
    type: auto_mode
  - platform: levoit
    levoit: levoitvital200
    name: "Sleep Mode Type"
    type: sleep_preference
  - platform: levoit
    levoit: levoitvital200
    name: "Daytime Fan Mode"
    type: daytime_fan_mode

text_sensor:
  - platform: levoit
    levoit: levoitvital200
    name: "MCU Version"
    type: mcu_version
  - platform: levoit
    levoit: levoitvital200
    name: "ESP Version"
    type: esp_version
  - platform: levoit
    levoit: levoitvital200
    name: "Error"
    type: error_message

button:
  - platform: levoit
    levoit: levoitvital200
    name: "Filter Reset"
    type: reset_filter_stats

binary_sensor:
  - platform: levoit
    levoit: levoitvital200
    name: "Filter Low"
    type: filter_low
  - platform: levoit
    levoit: levoitvital200
    name: "Dark Detected"
    type: dark_detected
